name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync WakaTime Data
        run: node scripts/sync-wakatime.js
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}

      - name: Sync LeetCode Data
        run: npx tsx scripts/fetch-leetcode.ts
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add src/features/waka/data/wakatime.json
          git add src/features/leetcode-stats/data/leetcode.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: automated metrics sync (wakatime & leetcode) [skip ci]"
            git push origin main
          else
            echo "数据无变化"
          fi

      - name: Build Astro
        run: npm run build
        env:
          PUBLIC_COMMENT_API_URL: ${{ vars.PUBLIC_COMMENT_API_URL }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
